<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- iOS-optimized viewport: prevents scaling, fits content to screen -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / homescreen icons for iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meeting" />

  <!-- Prevent iOS phone number auto-detection -->
  <meta name="format-detection" content="telephone=no" />

  <!-- Theme colors -->
  <meta name="theme-color" content="#1a1a2e" />

  <title>Meeting</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- Join screen (shown before entering meeting) -->
  <div id="join-screen">
    <div class="join-card">
      <div class="logo">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="20" cy="20" r="20" fill="#6c63ff"/>
          <path d="M12 15h10a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H12a2 2 0 0 1-2-2v-6a2 2 0 0 1 2-2z" fill="white"/>
          <path d="M24 18l6-3v10l-6-3V18z" fill="white"/>
        </svg>
      </div>
      <h1>Join Meeting</h1>
      <p class="room-id-label">Room: <span id="room-display"></span></p>
      <input
        type="text"
        id="display-name-input"
        placeholder="Your name"
        maxlength="30"
        autocomplete="name"
        autocorrect="off"
        spellcheck="false"
      />
      <div class="preview-container">
        <video id="preview-video" autoplay muted playsinline></video>
        <div class="preview-controls">
          <button class="ctrl-btn" id="preview-mic-btn" aria-label="Toggle microphone">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/></svg>
          </button>
          <button class="ctrl-btn" id="preview-cam-btn" aria-label="Toggle camera">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          </button>
        </div>
      </div>
      <button id="join-btn" class="join-button">Join Now</button>
      <button id="invite-btn" class="invite-button">Copy Invite Link</button>
    </div>
  </div>

  <!-- Meeting room (shown after joining) -->
  <div id="meeting-room" class="hidden">
    <!-- Video grid -->
    <div id="video-grid"></div>

    <!-- Bottom control bar -->
    <div id="controls-bar">
      <button class="ctrl-btn active" id="mic-btn" aria-label="Toggle microphone">
        <svg class="icon-mic-on" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V20H9v2h6v-2h-2v-2.07A7 7 0 0 0 19 11h-2z"/></svg>
        <svg class="icon-mic-off hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.18l5.98 5.99zM4.27 3L3 4.27l6.01 6.01V11c0 1.66 1.33 3 2.99 3 .22 0 .44-.03.65-.08l1.66 1.66c-.71.33-1.5.52-2.31.52-2.76 0-5.3-2.1-5.3-5.1H5c0 3.41 2.72 6.23 6 6.72V20H9v2h6v-2h-2v-2.28c.91-.13 1.77-.45 2.54-.9L19.73 21 21 19.73 4.27 3z"/></svg>
        <span>Mic</span>
      </button>

      <button class="ctrl-btn active" id="cam-btn" aria-label="Toggle camera">
        <svg class="icon-cam-on" viewBox="0 0 24 24" fill="currentColor"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        <svg class="icon-cam-off hidden" viewBox="0 0 24 24" fill="currentColor"><path d="M21 6.5l-4-4-15 15 1.5 1.5 2.96-2.96C7.17 16.48 7.58 17 8 17h9a1 1 0 0 0 1-1v-3.5l4 4V6.5zM16 15h-9l.05-.05 1.5-1.5.69-.69 6.76-6.76V15zM4 7.03 2.5 5.53 1 7l2 1.5V16a1 1 0 0 0 1 1h1.5l-1.5-1.5V7.03z"/></svg>
        <span>Camera</span>
      </button>

      <button class="ctrl-btn" id="share-btn" aria-label="Share screen">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 16V6h16v10.01L4 16z"/></svg>
        <span>Share</span>
      </button>

      <button class="ctrl-btn" id="chat-btn" aria-label="Open chat">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>
        <span>Chat</span>
        <span class="badge hidden" id="chat-badge">0</span>
      </button>

      <button class="ctrl-btn" id="flip-btn" aria-label="Flip camera">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 5h-3.17L15 3H9L7.17 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-8 13c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/><path d="M12 10v6l4-3-4-3z"/></svg>
        <span>Flip</span>
      </button>

      <button class="ctrl-btn leave-btn" id="leave-btn" aria-label="Leave meeting">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.09 15.59 11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
        <span>Leave</span>
      </button>
    </div>

    <!-- Participants count -->
    <div id="participants-count">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span id="participant-count-num">1</span>
    </div>
  </div>

  <!-- Chat panel -->
  <div id="chat-panel" class="hidden">
    <div class="chat-header">
      <h2>Chat</h2>
      <button id="close-chat-btn" aria-label="Close chat">&times;</button>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-input-row">
      <input
        type="text"
        id="chat-input"
        placeholder="Type a message…"
        maxlength="500"
        autocorrect="off"
      />
      <button id="send-chat-btn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21 23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" aria-live="polite"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
